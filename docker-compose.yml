services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: trace
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: localpass10
    ports:
      - "5432:5432"
    volumes:
      - trace_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trace_postgres: